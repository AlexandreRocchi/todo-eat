<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste de Courses</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="my-4">Liste de Courses</h1>
        <form id="item-form" class="mb-4">
            <div class="form-group">
                <input type="text" id="item-name" class="form-control" placeholder="Nom de l'élément" required>
            </div>
            <div class="form-group">
                <input type="number" id="item-quantity" class="form-control" placeholder="Quantité" required>
            </div>
            <div class="form-group">
                <select id="item-unit" class="form-control" required>
                    <option value="g">Grammes (g)</option>
                    <option value="l">Litres (l)</option>
                    <option value="">Pièces</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Ajouter à la Liste</button>
            <button type="button" id="save-template" class="btn btn-warning">Save Template</button>
            <button type="button" id="load-previous-week" class="btn btn-info">Charger la semaine précédente</button>
        </form>
        <ul id="shopping-list" class="list-group"></ul>
        <div class="mt-4">
            <a href="templates.html" class="btn btn-secondary">Templates</a>
            <a href="settings.html" class="btn btn-secondary">Paramètres</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
